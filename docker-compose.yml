services:
  mongo:
    image: mongo:7
    expose:
      - "27017"
    volumes:
      - Devices_Data_test:/data/db
    # порты можно не пробрасывать, если API в том же compose
  api:
    build: .
    ports:
      - "32000:8080"
    environment:
      - Database__ConnectionString=mongodb://mongo:27017
    depends_on:
      - mongo
  frontend:
    build:
      context: .                  # корень проекта (где лежит docker-compose.yml)
      dockerfile: Dockerfile.nginx # имя вашего Dockerfile
    ports:
      - "8080:80"                  # внешний порт 8080 -> внутри 80
    depends_on:
      - api
volumes:
  Devices_Data_test:
    name: Devices_Data_test 
